<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS4 WebKit Fuzzer</title>

</head>
<body>
<h1>PS4 WebKit Fuzzer v1.0</h1>

<div id="controls">
  <button id="btn-run-all">Run All</button>
  <button id="btn-run-selected">Run Selected</button>
  <button id="btn-stop">Stop</button>
  <button id="btn-clear">Clear Log</button>
  <button id="btn-export">Export JSON</button>
  &nbsp;&nbsp;
  <label><input type="checkbox" id="chk-stop-on-anomaly"> Stop on Anomaly/Crash</label>
  &nbsp;
  <label><input type="checkbox" id="chk-all" checked> Todos</label>
</div>

<div id="test-list">
  <!-- populado por runner.js -->
</div>

<div id="status-bar">Aguardando inicialização...</div>
<div id="log"></div>

<!--
  INSTRUÇÃO PARA ADICIONAR NOVOS TESTES:
  1. Crie tests/N.js registrando window.FuzzerTests['N'] = { ... }
  2. Adicione um <script src="tests/N.js"></script> abaixo, em ordem crescente
  3. Não altere nenhum outro arquivo
-->
<script src="core/logger.js"></script>
<script src="core/harness.js"></script>

<!-- ===== TESTES — adicionar novos <script> aqui em ordem crescente ===== -->
<script src="tests/1.js"></script>
<script src="tests/2.js"></script>
<script src="tests/3.js"></script>
<script src="tests/4.js"></script>
<script src="tests/5.js"></script>
<script src="tests/6.js"></script>
<script src="tests/7.js"></script>
<script src="tests/8.js"></script>
<!-- <script src="tests/6.js"></script> -->
<!-- ===================================================================== -->

<!-- runner sempre por último -->
<script src="core/runner.js"></script>
</body>
</html>
